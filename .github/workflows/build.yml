name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate PNG icons
        run: python3 src/icons/generate.py

      - name: Package extension
        run: |
          cd src
          zip -r ../partdb-browser-plugin.zip . \
            --exclude "icons/generate.py" \
            --exclude "icons/generate.sh" \
            --exclude "icons/icon.svg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: partdb-browser-plugin
          path: partdb-browser-plugin.zip
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate PNG icons
        run: python3 src/icons/generate.py

      - name: Package extension
        run: |
          cd src
          zip -r ../partdb-browser-plugin.zip . \
            --exclude "icons/generate.py" \
            --exclude "icons/generate.sh" \
            --exclude "icons/icon.svg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: partdb-browser-plugin.zip
          generate_release_notes: true
