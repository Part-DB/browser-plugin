<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Part-DB Browser Plugin – Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <img src="../icons/icon-48.png" alt="" width="36" height="36">
            <div>
                <h1>Part-DB Browser Plugin</h1>
                <p class="subtitle">Settings</p>
            </div>
        </header>

        <form id="settings-form">
            <div class="card">
                <h2 class="card-title">Connection</h2>

                <div class="form-group">
                    <label for="partdb-url">Part-DB base URL</label>
                    <input
                        type="url"
                        id="partdb-url"
                        name="partdbUrl"
                        placeholder="https://partdb.example.com"
                        required
                    >
                    <p class="form-hint">The root URL of your Part-DB instance (without trailing slash).</p>
                </div>

                <div class="form-group">
                    <label for="partdb-locale">Interface locale</label>
                    <input
                        type="text"
                        id="partdb-locale"
                        name="partdbLocale"
                        placeholder="en"
                        maxlength="10"
                        pattern="[a-z]{2}(_[A-Z]{2})?"
                    >
                    <p class="form-hint">
                        Language code used in URLs (e.g. <code>en</code>, <code>de</code>, <code>fr</code>).
                        Check your Part-DB URL to find your locale. Defaults to <code>en</code>.
                    </p>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Settings</button>
                <button type="button" id="test-btn" class="btn btn-secondary">Test Connection</button>
                <span id="save-status" class="save-status hidden"></span>
            </div>
        </form>

        <div id="test-result" class="test-result hidden"></div>
    </div>

    <script src="options.js"></script>
</body>
</html>
